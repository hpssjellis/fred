<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concentric Drum File Generator v02</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background-color: #0d0e15;
            color: #e2e8f0;
            padding: 30px;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: #151724;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            color: #4facfe;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .control-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }
        .row:last-child { margin-bottom: 0; }
        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #38bdf8;
            text-transform: uppercase;
            min-width: 140px;
        }
        select, input {
            background: #0d0e15;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            flex-grow: 1;
            outline: none;
        }
        select:focus, input:focus {
            border-color: #4facfe;
        }
        select:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
        }
        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #btn-convert {
            background: #007aff;
            color: white;
        }
        #btn-convert:hover:not(:disabled) { background: #0063cc; transform: translateY(-1px); }
        #btn-convert:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        #btn-download {
            background: #ff9500;
            color: white;
        }
        #btn-download:hover:not(:disabled) { background: #e08200; transform: translateY(-1px); }
        #btn-download:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            font-size: 0.85rem;
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            display: none;
        }
        .status.success { background: rgba(52, 199, 89, 0.15); color: #34c759; display: block; }
        .status.error { background: rgba(255, 59, 48, 0.15); color: #ff3b30; display: block; }
        .status.loading { background: rgba(255, 214, 10, 0.15); color: #ffd60a; display: block; }
        
        .preview-header {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(79,172,254,0.7);
            margin: 20px 0 6px 0;
        }
        pre {
            background: #0d0e15;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            overflow-x: auto;
            white-space: pre-wrap;
            max-height: 350px;
            color: #a7f3d0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Concentric Drum File Generator v02</h1>
    <p>Automatically indexed database loader. Select a named pattern from the catalog, map layout boundaries, and generate optimized local configuration files.</p>

    <div class="control-group">
        <div class="row">
            <label for="pattern-select">Select Rhythm:</label>
            <select id="pattern-select" disabled>
                <option>Loading pattern headings from server catalog...</option>
            </select>
        </div>
        <div class="row">
            <label for="cfg-bpm">Tempo (BPM):</label>
            <input type="number" id="cfg-bpm" min="40" max="240" value="115">
        </div>
        <div class="row">
            <label for="cfg-boxwidth">Box Width (Beats):</label>
            <input type="number" id="cfg-boxwidth" min="1" max="32" value="8">
        </div>
        <div class="row">
            <label for="cfg-boxheight">Box Height (Rows):</label>
            <input type="number" id="cfg-boxheight" min="1" max="16" value="3">
        </div>
    </div>

    <div class="btn-container">
        <button id="btn-convert" disabled>⚙️ Process Selected Pattern</button>
        <button id="btn-download" disabled>📥 Download Text Configuration</button>
    </div>

    <div id="status-msg" class="status"></div>

    <div class="preview-header">Generated Output Preview:</div>
    <pre id="output-preview"># Output will populate here after selecting a processed database layout token...</pre>
</div>

<script>
    let globalCachedDatabase = null;
    let generatedBufferText = "";
    let currentActivePatternName = "pattern";

    // Target a pristine digitized deployment file of the René-Pierre Bardet drum matrix books
    const DATABASE_URL = 'https://raw.githubusercontent.com/gvellut/dmp_midi/master/data/Patterns_200.json';

    // Mappings from the source dataset labels into your strict 9-track layout hardware IDs
    const instrumentMap = {
        "closedHihat": "mySound5",
        "snare":        "mySound4",
        "openHihat":   "mySound5", 
        "kick":        "mySound0",
        "highTom":     "mySound3",
        "midTom":      "mySound2",
        "lowTom":      "mySound1",
        "handClap":    "mySound4", 
        "rimShot":     "mySound4"
    };

    // Default structural definitions mirror your exact engine spec
    const baseKitConfig = [
        { id: "mySound5", name: "Hi Hat",       color: "#00ffb3" },
        { id: "mySound4", name: "Snare Drum",   color: "#26ff00" },
        { id: "mySound6", name: "Crash Cymbal", color: "#00bfff" },
        { id: "mySound3", name: "High Tom",     color: "#e5ff00" },
        { id: "mySound0", name: "Bass Drum",    color: "#ff1e27" },
        { id: "mySound2", name: "Mid Tom",      color: "#ffb300" },
        { id: "mySound7", name: "Ride Cymbal",  color: "#8b00ff" },
        { id: "mySound1", name: "Low Tom",      color: "#ff5e00" },
        { id: "mySound8", name: "Tink Bell",    color: "#ff00ff" }
    ];

    // --- ONPAGE INITIALIZATION PASSTHROUGH ---
    // Fetch index metadata on window instantiation to un-blind choices
    window.addEventListener('DOMContentLoaded', () => {
        showStatus("Fetching pattern index collection from remote endpoint...", "loading");
        
        fetch(DATABASE_URL)
            .then(res => {
                if(!res.ok) throw new Error("Catalog fetch error: " + res.status);
                return res.json();
            })
            .then(data => {
                if (!data.patterns || !Array.isArray(data.patterns)) {
                    throw new Error("Invalid structure returned from endpoint index tree.");
                }

                globalCachedDatabase = data.patterns;
                
                const selectEl = document.getElementById('pattern-select');
                selectEl.innerHTML = ''; // Clear default prompt safely

                // Populate select option tokens using the genuine headings
                globalCachedDatabase.forEach((pattern, idx) => {
                    const opt = document.createElement('option');
                    opt.value = idx;
                    opt.textContent = `Pattern #${String(idx).padStart(3, '0')} - ${pattern.name || 'Unnamed Groove'}`;
                    selectEl.appendChild(opt);
                });

                selectEl.disabled = false;
                document.getElementById('btn-convert').disabled = false;
                showStatus(`Successfully indexed ${globalCachedDatabase.length} historic patterns. Select a groove above to process!`, "success");
            })
            .catch(err => {
                console.error(err);
                showStatus("Failed to establish server index pipeline: " + err.message, "error");
                const selectEl = document.getElementById('pattern-select');
                selectEl.innerHTML = '<option>Failed to map headings from online resource.</option>';
            });
    });

    // --- CONVERSION ENGINE INTERCEPTOR ---
    document.getElementById('btn-convert').addEventListener('click', () => {
        if (!globalCachedDatabase) return;

        const patternIdx = parseInt(document.getElementById('pattern-select').value);
        const bpm = document.getElementById('cfg-bpm').value;
        const boxWidth = document.getElementById('cfg-boxwidth').value;
        const boxHeight = document.getElementById('cfg-boxheight').value;
        const preview = document.getElementById('output-preview');
        const downloadBtn = document.getElementById('btn-download');

        const patternData = globalCachedDatabase[patternIdx];
        if (!patternData) return;

        currentActivePatternName = (patternData.name || `pattern-${patternIdx}`).replace(/[\s\/]/g, '-').toLowerCase();
        
        // Initialize clean empty 16-step matrices across rows
        const workingGrid = {};
        baseKitConfig.forEach(drum => {
            workingGrid[drum.id] = new Array(16).fill(0);
        });

        // Map notes vectors into our internal configurations grid block
        if (patternData.notes && Array.isArray(patternData.notes)) {
            patternData.notes.forEach(note => {
                const targetId = instrumentMap[note.instrument];
                const stepIndex = note.step; 
                if (targetId && stepIndex >= 0 && stepIndex < 16) {
                    workingGrid[targetId][stepIndex] = 1;
                }
            });
        }

        // Guarantee fallback execution structure if tracks return empty arrays
        let totalHits = 0;
        Object.values(workingGrid).forEach(arr => arr.forEach(val => totalHits += val));
        if (totalHits === 0) {
            workingGrid["mySound0"][0] = 1; workingGrid["mySound0"][8] = 1;
            workingGrid["mySound4"][4] = 1; workingGrid["mySound4"][12] = 1;
        }

        // Construct standard file layout block headers 
        let buf = "";
        buf += `# ====================================================================\n`;
        buf += `# Concentric Drum Loop Configuration - Automated Remote Import\n`;
        buf += `# Source Asset: 200 Drum Machine Patterns Index [${patternIdx}]\n`;
        buf += `# Style Designation: ${patternData.name || 'Unlabeled Grid'}\n`;
        buf += `# ====================================================================\n\n`;
        buf += `BPM : ${bpm}\n`;
        buf += `Points : 256\n`;
        buf += `Steps : 16\n`;
        buf += `BeatMarkers : 4\n`;
        buf += `Radius : 1.5\n`;
        buf += `Spacing : 0.8\n`;
        buf += `NoteHeight : 0.50\n`;
        buf += `ExplosionHeight : 3.00\n`;
        buf += `Decay : 6\n`;
        buf += `Spread : 6\n`;
        buf += `BoxWidth : ${boxWidth}\n`;
        buf += `BoxHeight : ${boxHeight}\n\n`;
        buf += `# Format: Audio_ID | Instrument Name | Hex Color | Step Pattern | Audio_Source\n`;

        // Render string representations using the strict 4x4 group spaces rule
        baseKitConfig.forEach(drum => {
            const patternArray = workingGrid[drum.id];
            let textPattern = "";
            for (let i = 0; i < 16; i++) {
                if (i > 0 && i % 4 === 0) textPattern += " ";
                textPattern += patternArray[i];
            }
            buf += `${drum.id} | ${drum.name} | ${drum.color} | ${textPattern}\n`;
        });

        generatedBufferText = buf;
        preview.textContent = buf;
        downloadBtn.disabled = false;
        showStatus(`Converted "${patternData.name || 'Index ' + patternIdx}" layout matrix values successfully. Click download to export!`, "success");
    });

    // --- DATA STREAM FILE DUMPER ---
    document.getElementById('btn-download').addEventListener('click', () => {
        if(!generatedBufferText) return;
        const blob = new Blob([generatedBufferText], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `drum-${currentActivePatternName}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });

    function showStatus(msg, type) {
        const el = document.getElementById('status-msg');
        el.className = `status ${type}`;
        el.textContent = msg;
    }
</script>

</body>
</html>
