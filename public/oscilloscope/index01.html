<!DOCTYPE html>
<html>
<head>
  <style>canvas { background: #111; border: 2px solid #333; }</style>
</head>
<body>
  <button onclick="startOscilloscope()">Turn On Scope</button><br><br>
  <canvas id="scope" width="600" height="300"></canvas>

  <script>
    async function startOscilloscope() {
      // 1. Grab the audio stream from the mic/line-in port
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      
      // 2. Create the analyzer node
      const analyzer = audioCtx.createAnalyser();
      analyzer.fftSize = 2048; // Controls the resolution of the wave
      source.connect(analyzer);

      const bufferLength = analyzer.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength); // Holds our waveform data

      // 3. Setup the canvas drawing environment
      const canvas = document.getElementById("scope");
      const ctx = canvas.getContext("2d");

      function draw() {
        requestAnimationFrame(draw); // Create a loop to redraw at 60fps
        analyzer.getByteTimeDomainData(dataArray); // Grab current snapshot of wave

        // Clear the canvas for the new frame
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw the oscilloscope line
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#00ffcc"; // Neon cyan trace
        ctx.beginPath();

        const sliceWidth = canvas.width / bufferLength;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
          const v = dataArray[i] / 128.0; // Normalize the data
          const y = (v * canvas.height) / 2;

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);

          x += sliceWidth;
        }

        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
      }
      draw();
    }
  </script>
</body>
</html>
